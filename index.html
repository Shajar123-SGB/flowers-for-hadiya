<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>🌸 For Hadiya</title>

<meta name="theme-color" content="#0b0b0b">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===========================
Animated Background
=========================== -->

<div id="background">

<div id="gradient"></div>

<div id="stars"></div>

<div id="particles"></div>

<div id="petals"></div>

</div>

<!-- ===========================
Music Button
=========================== -->

<button id="musicBtn">

♫

</button>

<!-- ===========================
Progress Bars
=========================== -->

<div id="progressContainer">

</div>

<!-- ===========================
Story Container
=========================== -->

<main id="storyContainer">

<div id="storyCard">

<!-- Bouquet -->

<div id="imageContainer">

<img
id="storyImage"
src=""
alt="Bouquet">

<div id="imageGlow"></div>

</div>

<!-- Content -->

<div id="content">

<h1 id="storyTitle">

For Hadiya

</h1>

<p id="storySubtitle">

A little garden,
made only for you.

</p>

<p id="storyMessage">

Every flower in this collection
was chosen with love.

</p>

</div>

</div>

</main>

<!-- ===========================
Bottom Hint
=========================== -->

<div id="hint">

<span>

← Swipe →

</span>

</div>

<!-- ===========================
Enter Screen
=========================== -->

<section id="intro">

<div id="introContent">

<div id="introFlower">

🌸

</div>

<h2>

Some flowers bloom
for everyone...

</h2>

<h3>

These were picked
only for you.

</h3>

<h1>

For Hadiya ❤️

</h1>

<p>

A small digital garden,
made with love,
by Shajar.

</p>

<button id="enterBtn">

<span>

Enter My Garden

</span>

<div class="buttonGlow"></div>

</button>

</div>

</section>

<!-- ===========================
Secret Ending
=========================== -->

<section id="secretScreen">

<img
id="hijabiGirl"
src="images/hijabi.png"
alt="Hijabi Girl">

<h1>

For Hadiya ❤️

</h1>

<p id="secretText">

</p>

<button id="restartBtn">

Visit Again 🌸

</button>

</section>

<!-- ===========================
Audio
=========================== -->

<audio
id="music"
loop>

<source
src="music/piano.mp3"
type="audio/mpeg">

</audio>

<!-- ===========================
JavaScript
=========================== -->

<script src="script.js"></script>

</body>

</html>
